        } . watch-face {
        width: 100vw;
        height: 100vh;
        max-width: 320px;
        max-height: 320px;
        aspect-ratio: 1/1;
        margin: auto;
        border-radius: 5rem;
        position: relative;
        overflow: hidden;
        }
    }

<body class="flex items-center justify-center min-h-screen bg-[#000A00]">

<div class="grain-overlay absolute inset-0 z-10"></div>
<!-- Background Roast Visual (Minimalist) -->

<div class="absolute inset-0 bg-gradient-to-b from-primary/20 via-transparent to-primary"></div>
</div>
<!-- Top Status Row -->
<div class="w-full flex justify-between items-center px-4 pt-4 z-20">
<span class="text-[10px] font-headline font-black tracking-widest text-on-secondary-container">DEOMALI</span>
<div class="flex gap-2">
<span class="material-symbols-outlined text-[14px] text-secondary-container">local_fire_department</span>
</div>
</div>
<!-- Main Content Core -->
<div class="flex flex-col items-center text-center px-4 z-20 mt-2">
<!-- Tagline -->
<p class="font-headline text-[11px] uppercase tracking-[0.2em] text-surface-variant mb-1">Brewed at the Peak</p>
<!-- Headline / Roast Name -->
<h1 class="font-headline text-3xl font-black leading-none tracking-tighter text-background">
                SUMATRA<br/>GAYO
            </h1>
<!-- Roast Profile Indicator -->
<div class="mt-3 flex items-center gap-1.5">
<div class="h-1 w-8 rounded-full bg-primary-container"></div>
<div class="h-1 w-8 rounded-full bg-secondary-container"></div>
<div class="h-1 w-8 rounded-full bg-primary-container"></div>
<span class="text-[8px] font-label font-bold uppercase tracking-widest text-surface-variant/60 ml-1">Dark</span>
</div>
</div>
<!-- Action Area -->
<div class="w-full flex flex-col items-center gap-2 pb-6 z-20">
<button class="bg-secondary-container text-on-secondary-fixed py-2.5 px-8 rounded-full font-label font-extrabold text-[12px] uppercase tracking-widest active:scale-95 transition-transform shadow-lg shadow-primary-container/40">
                Shop Now
            </button>
<!-- Quick Glance Data -->
<div class="flex items-center gap-3 mt-1 opacity-80">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[10px] text-surface-variant">schedule</span>
<span class="text-[9px] font-body text-surface-variant">Fresh: 2h ago</span>
</div>
<div class="w-1 h-1 rounded-full bg-surface-variant/30"></div>

<span class="material-symbols-outlined text-[10px] text-surface-variant">thermostat</span>

</div>
</div>
</div>

<div class="w-1 h-1 rounded-full bg-surface-variant/20"></div>
<div class="w-1 h-1 rounded-full bg-surface-variant/20"></div>
</div>
